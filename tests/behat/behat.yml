default:
  extensions:
    Behat\MinkExtension:
      base_url: http://127.0.0.1
      default_session: selenium2
      javascript_session: selenium2
      selenium2:
        wd_host: "http://127.0.0.1:9515"
        browser: chrome
        capabilities:
          browserName: chrome
          extra_capabilities:
            "goog:chromeOptions":
              args:
                - "--no-sandbox"
                - "--disable-dev-shm-usage"
                - "--disable-gpu"
      files_path: "%paths.base%/../../"
  suites:
    default:
      paths: ["%paths.base%/features"]
  formatters:
    pretty: true
