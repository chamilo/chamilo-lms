# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    form: true
    secret: '%env(APP_SECRET)%'
    #csrf_protection: true
    http_method_override: false
    handle_all_throwables: true

    # Enables session support. Note that the session will ONLY be started if you read or write from it.
    # Remove or comment this section to explicitly disable session support.
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        name: chamilo2
    #esi: true
    #fragments: true
    php_errors:
        log: true
    serializer: {enable_attributes: true}

    # UUIDs are generated statically as v4 (e.g. ResourceNode::$uuid), never through the
    # UuidFactory service, so these versions only pin the Symfony 7 defaults to silence the
    # deprecation about implicit uid config. default = 4 to match Uuid::v4(); the time-based
    # factory is unused here and pinned to the Symfony 7 default (7).
    uid:
        default_uuid_version: 4
        time_based_uuid_version: 7

    trusted_proxies: '%env(TRUSTED_PROXIES)%'
    trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port']

    error_controller: 'Chamilo\CoreBundle\Controller\ErrorController::show'

    rate_limiter:
        opengraph_fetch:
            policy: 'sliding_window'
            limit: 5
            interval: '1 minute'

    # For legacy code (ending in ".php"), also edit public/main/inc/global.inc.php according to the changes you make here

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
